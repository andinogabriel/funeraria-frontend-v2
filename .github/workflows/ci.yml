name: CI

on:
  push:
    branches:
      - main
      - master
      - "chore/**"
      - "feat/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        # `npm ci` enforces lockfile parity. The legacy peer-deps flag mirrors the install
        # convention chosen at bootstrap time to absorb peer-range mismatches that surface
        # only on the first install of an Angular major; revisit when those settle.
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage

      - name: Build
        # Production build also exercises the bundle budgets defined in angular.json
        # (initial 500kB warning, 1MB error). Failure here means a feature added more
        # weight than the project allows without a deliberate budget bump.
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

      - name: Upload dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore
