<div class="flex flex-col gap-6">
  <header class="flex items-center gap-3">
    <mat-icon class="material-symbols-outlined !text-3xl !w-8 !h-8 text-[var(--mat-sys-primary)]">
      dashboard
    </mat-icon>
    <div class="flex flex-col">
      <h1 class="text-2xl lg:text-3xl font-semibold m-0 leading-tight">Dashboard</h1>
      <p class="text-sm text-[var(--mat-sys-on-surface-variant)] m-0">
        Vista general de la operación.
      </p>
    </div>
  </header>

  <mat-card class="!rounded-xl">
    <mat-card-content class="!p-6 flex flex-col gap-1">
      <p class="m-0 text-base">¡Bienvenido a la nueva consola de Funeraria!</p>
      <p class="m-0 text-sm text-[var(--mat-sys-on-surface-variant)]">
        Sesión activa con autoridades:
        <span class="font-medium">{{ authoritiesText() }}</span>
      </p>
    </mat-card-content>
  </mat-card>

  <!--
    Stat cards are placeholders until real metrics are wired. Kept inline (vs. a
    separate component) because the dashboard itself is scheduled for a proper rebuild
    once the metrics endpoints land.
  -->
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
    <mat-card class="!rounded-xl">
      <mat-card-content class="!p-5 flex items-start gap-4">
        <div
          class="flex items-center justify-center w-10 h-10 rounded-md bg-[var(--mat-sys-primary-container)] text-[var(--mat-sys-on-primary-container)]"
        >
          <mat-icon class="material-symbols-outlined">group</mat-icon>
        </div>
        <div class="flex flex-col">
          <span class="text-xs uppercase tracking-wide text-[var(--mat-sys-on-surface-variant)]">
            Afiliados activos
          </span>
          <span class="text-2xl font-semibold">—</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="!rounded-xl">
      <mat-card-content class="!p-5 flex items-start gap-4">
        <div
          class="flex items-center justify-center w-10 h-10 rounded-md bg-[var(--mat-sys-secondary-container)] text-[var(--mat-sys-on-secondary-container)]"
        >
          <mat-icon class="material-symbols-outlined">workspace_premium</mat-icon>
        </div>
        <div class="flex flex-col">
          <span class="text-xs uppercase tracking-wide text-[var(--mat-sys-on-surface-variant)]">
            Planes activos
          </span>
          <span class="text-2xl font-semibold">—</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="!rounded-xl">
      <mat-card-content class="!p-5 flex items-start gap-4">
        <div
          class="flex items-center justify-center w-10 h-10 rounded-md bg-[var(--mat-sys-tertiary-container)] text-[var(--mat-sys-on-tertiary-container)]"
        >
          <mat-icon class="material-symbols-outlined">event_available</mat-icon>
        </div>
        <div class="flex flex-col">
          <span class="text-xs uppercase tracking-wide text-[var(--mat-sys-on-surface-variant)]">
            Servicios del mes
          </span>
          <span class="text-2xl font-semibold">—</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="!rounded-xl">
      <mat-card-content class="!p-5 flex items-start gap-4">
        <div
          class="flex items-center justify-center w-10 h-10 rounded-md bg-[var(--mat-sys-surface-container-high)] text-[var(--mat-sys-on-surface)]"
        >
          <mat-icon class="material-symbols-outlined">policy</mat-icon>
        </div>
        <div class="flex flex-col">
          <span class="text-xs uppercase tracking-wide text-[var(--mat-sys-on-surface-variant)]">
            Eventos auditados (24 h)
          </span>
          <span class="text-2xl font-semibold">—</span>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
