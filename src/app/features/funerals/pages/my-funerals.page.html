<div class="flex flex-col gap-6">
  <header class="flex flex-wrap items-center gap-3">
    <mat-icon class="material-symbols-outlined !text-3xl !w-8 !h-8 text-[var(--mat-sys-primary)]">
      person_pin
    </mat-icon>
    <div class="flex flex-col">
      <h1 class="text-2xl lg:text-3xl font-semibold m-0 leading-tight">Mis servicios</h1>
      <p class="text-sm text-[var(--mat-sys-on-surface-variant)] m-0">
        Servicios funerarios que registraste con tu cuenta.
      </p>
    </div>
    <span class="flex-1"></span>

    <button mat-stroked-button (click)="onRefresh()" [disabled]="loading()">
      <mat-icon class="material-symbols-outlined">refresh</mat-icon>
      Actualizar
    </button>
  </header>

  @if (error(); as message) {
    <div
      role="alert"
      class="rounded-md p-3 text-sm bg-[var(--mat-sys-error-container)] text-[var(--mat-sys-on-error-container)]"
    >
      {{ message }}
    </div>
  }

  <app-selection-list-card
    [searchControl]="searchControl"
    searchLabel="Buscar por fallecido, DNI o recibo"
    [data]="filtered()"
    [columns]="columns"
    [trackBy]="trackById"
    storageKey="my-funerals.list"
    [initialSort]="{ active: 'funeralDate', direction: 'desc' }"
    [loading]="loading()"
    emptyIcon="person_pin"
    emptyTitle="No tenés servicios registrados a tu nombre."
    emptyHint="Cuando registres un servicio, aparecerá aquí."
    [actions]="actions()"
    [(selectedRow)]="selectedFuneral"
  />
</div>
