<mat-sidenav-container class="h-screen">
  <mat-sidenav mode="side" opened class="w-64 border-r" disableClose>
    <div class="flex items-center gap-2 px-4 py-5">
      <mat-icon class="material-symbols-outlined">local_florist</mat-icon>
      <span class="font-semibold text-lg">Funeraria</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="bg-[var(--mat-sys-secondary-container)]"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          <mat-icon matListItemIcon class="material-symbols-outlined">{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="flex flex-col">
    <mat-toolbar class="!bg-[var(--mat-sys-surface-container)] border-b">
      <span class="flex-1"></span>
      <button mat-icon-button (click)="onLogout()" aria-label="Cerrar sesión">
        <mat-icon class="material-symbols-outlined">logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="flex-1 overflow-auto p-6">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
